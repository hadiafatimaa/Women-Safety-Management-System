<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Women Safety System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #6a0dad, #ff69b4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .navbar h1 { font-size: 20px; }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .navbar a:hover { background: rgba(255,255,255,0.4); }
        .welcome {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            color: #333;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: #333;
        }
        .card:hover { transform: translateY(-5px); }
        .card .icon { font-size: 50px; margin-bottom: 15px; }
        .card h3 { font-size: 18px; margin-bottom: 10px; color: #6a0dad; }
        .card p { font-size: 13px; color: #666; }
        .sos-card {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
        }
        .sos-card h3 { color: white; }
        .sos-card p { color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🛡️ Women Safety System</h1>
    <a href="Logout">Logout</a>
</div>

<div class="welcome">
    👋 Welcome, <strong id="userName">User</strong>!
</div>

<div class="cards">
    <!-- SOS Card -->
    <a href="sos.html" class="card sos-card">
        <div class="icon">🆘</div>
        <h3>SOS Alert</h3>
        <p>Send emergency alert with your live location</p>
    </a>

    <!-- Report Incident -->
    <a href="incident.html" class="card">
        <div class="icon">📋</div>
        <h3>Report Incident</h3>
        <p>Report a safety incident with location details</p>
    </a>

    <!-- Emergency Contacts -->
    <a href="contacts.html" class="card">
        <div class="icon">📞</div>
        <h3>Emergency Contacts</h3>
        <p>Manage your emergency contact list</p>
    </a>

    <!-- My Profile -->
    <a href="profile.html" class="card">
        <div class="icon">👤</div>
        <h3>My Profile</h3>
        <p>View and update your profile information</p>
    </a>
</div>

<script>
    // Get username from session via API
    fetch('GetSession')
        .then(res => res.json())
        .then(data => {
            if(data.userName) {
                document.getElementById('userName').textContent = data.userName;
            } else {
                window.location.href = 'index.html';
            }
        })
        .catch(() => {
            window.location.href = 'index.html';
        });
</script>
</body>
</html>
