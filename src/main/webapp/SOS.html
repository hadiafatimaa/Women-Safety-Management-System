<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alert - Women Safety System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #6a0dad, #ff69b4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .navbar h1 { font-size: 20px; }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .content {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .sos-button-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .sos-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            transition: transform 0.1s;
            animation: pulse 2s infinite;
        }
        .sos-btn:hover { transform: scale(1.05); }
        .sos-btn:active { transform: scale(0.95); }
        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 60px rgba(255,0,0,0.8); }
            100% { box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h3 {
            color: #6a0dad;
            margin-bottom: 15px;
            font-size: 18px;
        }
        #map {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .location-info {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            height: 80px;
        }
        .send-btn {
            width: 100%;
            padding: 15px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .send-btn:hover { background: #ff69b4; }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #6a0dad;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🆘 SOS Alert</h1>
    <a href="dashboard.html">← Back</a>
</div>

<div class="content">

    <div id="responseMsg" class="message"></div>

    <!-- SOS Button -->
    <div class="sos-button-container">
        <button class="sos-btn" onclick="sendSOS()">
            🆘<br>SOS<br><span style="font-size:14px">Press & Hold</span>
        </button>
    </div>

    <!-- Map -->
    <div class="card">
        <h3>📍 Your Current Location</h3>
        <div id="map"></div>
        <div class="location-info" id="locationText">
            Getting your location...
        </div>
    </div>

    <!-- Custom Message -->
    <div class="card">
        <h3>💬 Add Message (Optional)</h3>
        <textarea id="sosMessage" placeholder="Describe your emergency..."></textarea>
        <button class="send-btn" onclick="sendSOS()">
            🆘 Send SOS Alert
        </button>
    </div>

</div>

<!-- Google Maps -->
<script>
    let userLat = null;
    let userLng = null;
    let map = null;
    let marker = null;

    // Get user location and show map
    function initMap() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;

                    const location = { lat: userLat, lng: userLng };

                    map = new google.maps.Map(document.getElementById('map'), {
                        zoom: 15,
                        center: location
                    });

                    marker = new google.maps.Marker({
                        position: location,
                        map: map,
                        title: 'You are here',
                        animation: google.maps.Animation.BOUNCE
                    });

                    document.getElementById('locationText').innerHTML =
                        '📍 Latitude: ' + userLat.toFixed(6) +
                        ' | Longitude: ' + userLng.toFixed(6);
                },
                function(error) {
                    document.getElementById('locationText').innerHTML =
                        '❌ Could not get location. Please enable GPS.';
                }
            );
        }
    }

    // Send SOS to backend
    function sendSOS() {
        const message = document.getElementById('sosMessage').value;
        const location = userLat && userLng ?
            userLat + ',' + userLng : 'Location unavailable';

        const formData = new FormData();
        formData.append('message', message);
        formData.append('location', location);

        fetch('SOS', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            const msg = document.getElementById('responseMsg');
            msg.style.display = 'block';
            if(data.status === 'success') {
                msg.className = 'message success';
                msg.innerHTML = '✅ SOS Alert Sent Successfully!';
            } else {
                msg.className = 'message error';
                msg.innerHTML = '❌ Failed to send SOS. Try again!';
            }
            setTimeout(() => msg.style.display = 'none', 3000);
        });
    }
</script>

<!-- Replace YOUR_API_KEY with your Google Maps API key -->
<script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
