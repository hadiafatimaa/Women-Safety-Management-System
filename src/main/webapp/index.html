<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women Safety Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a0dad, #ff69b4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #6a0dad;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .tabs {
            display: flex;
            margin-bottom: 25px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid #ddd;
            color: #999;
            font-weight: bold;
        }
        .tab.active {
            border-bottom: 3px solid #6a0dad;
            color: #6a0dad;
        }
        .form-section { display: none; }
        .form-section.active { display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #6a0dad;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #ff69b4; }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h2>🛡️ Women Safety System</h2>

    <!-- Messages -->
    <div id="msg"></div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div class="form-section active" id="login">
        <form action="Login" method="post">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Register Form -->
    <div class="form-section" id="register">
        <form action="Register" method="post">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
    }

    // Show messages from URL
    const params = new URLSearchParams(window.location.search);
    const msg = document.getElementById('msg');
    if(params.get('registered')) {
        msg.innerHTML = '<div class="message success"> Registered successfully! Please login.</div>';
    } else if(params.get('error') === 'invalid') {
        msg.innerHTML = '<div class="message error">Wrong email or password!</div>';
    } else if(params.get('error') === 'exists') {
        msg.innerHTML = '<div class="message error">Email already registered!</div>';
    } else if(params.get('error') === 'empty') {
        msg.innerHTML = '<div class="message error">Please fill all fields!</div>';
    }
</script>
</body>
</html>
