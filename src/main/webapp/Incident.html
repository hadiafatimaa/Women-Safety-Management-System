<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident - Women Safety System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #6a0dad, #ff69b4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .navbar h1 { font-size: 20px; }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .content {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h3 {
            color: #6a0dad;
            margin-bottom: 15px;
            font-size: 18px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            height: 120px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #6a0dad;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        .submit-btn:hover { background: #ff69b4; }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        #map {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }
        .location-info {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }
        .incidents-list { margin-top: 10px; }
        .incident-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        .incident-item p {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }
        .incident-item small {
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>📋 Report Incident</h1>
    <a href="dashboard.html">← Back</a>
</div>

<div class="content">

    <div id="responseMsg" class="message"></div>

    <!-- Report Form -->
    <div class="card">
        <h3>📝 Report New Incident</h3>

        <!-- Map -->
        <div id="map"></div>
        <div class="location-info" id="locationText">
            📍 Getting your location...
        </div>

        <textarea id="description"
                  placeholder="Describe what happened..."></textarea>

        <button class="submit-btn" onclick="submitIncident()">
            📋 Submit Report
        </button>
    </div>

    <!-- Previous Incidents -->
    <div class="card">
        <h3>📁 My Previous Reports</h3>
        <div class="incidents-list" id="incidentsList">
            Loading...
        </div>
    </div>

</div>

<script>
    let userLat = null;
    let userLng = null;

    // Initialize map
    function initMap() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;

                    const location = { lat: userLat, lng: userLng };

                    const map = new google.maps.Map(
                        document.getElementById('map'), {
                        zoom: 15,
                        center: location
                    });

                    new google.maps.Marker({
                        position: location,
                        map: map,
                        title: 'You are here'
                    });

                    document.getElementById('locationText').innerHTML =
                        '📍 Lat: ' + userLat.toFixed(6) +
                        ' | Lng: ' + userLng.toFixed(6);
                },
                function() {
                    document.getElementById('locationText').innerHTML =
                        '❌ Could not get location. Please enable GPS.';
                }
            );
        }
    }

    // Submit incident
    function submitIncident() {
        const description = document.getElementById('description').value;

        if(!description.trim()) {
            showMessage('error', '❌ Please describe the incident!');
            return;
        }

        const location = userLat && userLng ?
            userLat + ',' + userLng : 'Location unavailable';

        const formData = new FormData();
        formData.append('description', description);
        formData.append('location', location);

        fetch('Incident', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(Array.isArray(data)) {
                showMessage('success', '✅ Incident reported successfully!');
                document.getElementById('description').value = '';
                loadIncidents();
            } else {
                showMessage('error', '❌ Failed to submit. Try again!');
            }
        });
    }

    // Load previous incidents
    function loadIncidents() {
        fetch('Incident')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('incidentsList');
            if(data.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center">No incidents reported yet.</p>';
                return;
            }
            list.innerHTML = data.map(item => `
                <div class="incident-item">
                    <p>📝 ${item.description}</p>
                    <p>📍 ${item.location}</p>
                    <small>🕐 ${item.created_at}</small>
                </div>
            `).join('');
        });
    }

    // Show message
    function showMessage(type, text) {
        const msg = document.getElementById('responseMsg');
        msg.style.display = 'block';
        msg.className = 'message ' + type;
        msg.innerHTML = text;
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    // Load incidents on page open
    loadIncidents();
</script>

<!-- Replace YOUR_API_KEY with your Google Maps API key -->
<script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
