<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Contacts - Women Safety System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #6a0dad, #ff69b4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .navbar h1 { font-size: 20px; }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .content {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h3 {
            color: #6a0dad;
            margin-bottom: 15px;
            font-size: 18px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus {
            outline: none;
            border-color: #6a0dad;
        }
        .add-btn {
            width: 100%;
            padding: 12px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .add-btn:hover { background: #ff69b4; }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        .contact-info h4 {
            font-size: 15px;
            color: #333;
            margin-bottom: 4px;
        }
        .contact-info p {
            font-size: 13px;
            color: #666;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .delete-btn:hover { background: #cc0000; }
        .call-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 8px;
            text-decoration: none;
        }
        .call-btn:hover { background: #218838; }
        .empty-msg {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>📞 Emergency Contacts</h1>
    <a href="dashboard.html">← Back</a>
</div>

<div class="content">

    <div id="responseMsg" class="message"></div>

    <!-- Add Contact Form -->
    <div class="card">
        <h3>➕ Add Emergency Contact</h3>
        <input type="text" id="contactName"
               placeholder="Contact Name (e.g. Mom, Sister)">
        <input type="tel" id="contactPhone"
               placeholder="Phone Number">
        <button class="add-btn" onclick="addContact()">
            ➕ Add Contact
        </button>
    </div>

    <!-- Contacts List -->
    <div class="card">
        <h3>📋 My Emergency Contacts</h3>
        <div id="contactsList">
            Loading...
        </div>
    </div>

</div>

<script>
    // Load all contacts
    function loadContacts() {
        fetch('Contact')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('contactsList');
            if(data.length === 0) {
                list.innerHTML = '<p class="empty-msg">No emergency contacts added yet.</p>';
                return;
            }
            list.innerHTML = data.map(contact => `
                <div class="contact-item">
                    <div class="contact-info">
                        <h4>👤 ${contact.contact_name}</h4>
                        <p>📞 ${contact.contact_phone}</p>
                    </div>
                    <div>
                        <a class="call-btn"
                            href="tel:${contact.contact_phone}">
                            📞 Call
                        </a>
                        <button class="delete-btn"
                            onclick="deleteContact(${contact.id})">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `).join('');
        });
    }

    // Add new contact
    function addContact() {
        const name = document.getElementById('contactName').value;
        const phone = document.getElementById('contactPhone').value;

        if(!name.trim() || !phone.trim()) {
            showMessage('error', '❌ Please fill both name and phone!');
            return;
        }

        const formData = new FormData();
        formData.append('contact_name', name);
        formData.append('contact_phone', phone);

        fetch('Contact', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                showMessage('success', '✅ Contact added successfully!');
                document.getElementById('contactName').value = '';
                document.getElementById('contactPhone').value = '';
                loadContacts();
            } else {
                showMessage('error', '❌ Failed to add contact!');
            }
        });
    }

    // Delete contact
    function deleteContact(id) {
        if(!confirm('Are you sure you want to delete this contact?')) return;

        fetch('Contact?id=' + id, {
            method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                showMessage('success', '✅ Contact deleted!');
                loadContacts();
            } else {
                showMessage('error', '❌ Failed to delete!');
            }
        });
    }

    // Show message
    function showMessage(type, text) {
        const msg = document.getElementById('responseMsg');
        msg.style.display = 'block';
        msg.className = 'message ' + type;
        msg.innerHTML = text;
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    // Load contacts when page opens
    loadContacts();
</script>

</body>
</html>
